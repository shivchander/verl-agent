# WebShop O-PEaR: beta=1.0, margin=2, lambda=0.1, selection_ratio=1.0 (all failed rollouts)
# Three-way ranking loss: L_cv + L_cp, enriched privileged facts
experiment_name: drgrpo_opear_webshop_b1m3_sr100_lambda01
gpus: "4,5,6,7"

# O-PEaR config
opear_enable: true
opear_lambda: 0.1
opear_beta: 1.0
opear_margin: 2
opear_selection_ratio: 1.0
opear_guide_model: gpt-5.4-nano

# Model
model: Qwen/Qwen3-4B
tp: 2
gpu_memory_utilization: 0.5
max_model_len: 8192

# Data
group_size: 8
train_batch_size: 16
val_batch_size: 128
max_prompt_length: 2048
max_response_length: 4096
seed: 42

# Actor
lr: 1.0e-6
loss_agg_mode: seq-mean-token-sum-norm

# Algorithm
gamma: 0.95

# Agent loop
max_user_turns: 15

# Trainer
epochs: 250
save_freq: 10
test_freq: 5
val_before_train: true
logger: '["console","wandb"]'
project_name: opear_webshop
