# Quick test config — small batch, skip val, 3 steps
experiment_name: opear_test_gradient_scale
gpus: "0,1,2,3"

# O-PEaR config
opear_enable: true
opear_lambda: 1.0
opear_beta: 0.1
opear_selection_ratio: 0.5
opear_guide_model: gpt-5.4-nano

# Model
model: Qwen/Qwen3-4B
tp: 2
gpu_memory_utilization: 0.5
max_model_len: 18432

# Data — small batch for fast iteration
group_size: 8
train_batch_size: 4
val_batch_size: 4
max_prompt_length: 2048
max_response_length: 15360
seed: 42

# Actor
lr: 1.0e-6
loss_agg_mode: seq-mean-token-sum-norm

# Algorithm
gamma: 0.95

# Agent loop
max_user_turns: 50

# Trainer — skip val, run 3 steps
epochs: 10
save_freq: 100
test_freq: 100
val_before_train: false
logger: '["console"]'
project_name: opear_alfworld
